version: "3.1"

rules:
- rule: Saludar al usuario
  steps:
  - intent: greet
  - action: utter_greet

- rule: Despedirse del usuario
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Enviar preguntas a FastAPI (Llama 3)
  steps:
  - intent: hacer_pregunta
  - action: action_consultar_pdf

- rule: Enviar todo lo que no entienda a FastAPI (Fallback)
  steps:
  - intent: nlu_fallback
  - action: action_consultar_pdf